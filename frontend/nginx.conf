server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # TLS is terminated at Traefik and forwarded here as plain http, so nginx's
    # $scheme is "http". Emit relative Location headers (no scheme/host) so a
    # redirect issued to an https client — notably the session-containment redirect
    # below — is resolved against the original https origin, not downgraded to http
    # (which, inside the https console's iframe, the browser blocks as mixed content).
    absolute_redirect off;

    # Security headers (the API sets its own; these harden the static shell).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache-bust: hashed assets are immutable, index.html is never cached.
    location /assets/ {
        # Contain escaped device references (see the note in `location /`): a
        # proxied UI that points at a root-absolute /assets/ path must be sent back
        # into its session, not handed the console's own bundles.
        if ($http_referer ~ "^https?://[^/]+/proxy/([^/]+)/") {
            return 307 /proxy/$1$request_uri;
        }
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Proxy API and brokered-session traffic to the Go backend service.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /proxy/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # SPA client-side routing fallback.
    location / {
        # Containment for brokered sessions. A proxied device UI (e.g. a firewall
        # SPA) can hard-navigate to a root-absolute URL — window.location = "/..." —
        # which the server-injected <base>/URL-shim cannot intercept. That request
        # escapes /proxy/<sid>/ and, since Traefik routes everything outside /api and
        # /proxy here, would be served the GuardRail console *inside the session
        # iframe* (a 404 or the dashboard, not the device). When the Referer shows the
        # request originated inside a session frame, redirect it back into that
        # session so the device UI stays contained. Mirrors the Go serveWeb() handler,
        # which never runs in this topology because these requests reach nginx first.
        if ($http_referer ~ "^https?://[^/]+/proxy/([^/]+)/") {
            return 307 /proxy/$1$request_uri;
        }
        try_files $uri $uri/ /index.html;
    }
}
