# Simple nginx reverse-proxy edge — a lightweight alternative to Traefik.
# Fronts the API on a single port and (in production) serves the built SPA.
# Upstream is resolved via Docker Compose service DNS.

upstream guardrail_api {
    server api:8080;
}

server {
    listen 80;
    server_name _;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # API + brokered-session traffic → the Go API.
    location /api/    { proxy_pass http://guardrail_api; include /etc/nginx/proxy_common.conf; }
    location /proxy/  { proxy_pass http://guardrail_api; include /etc/nginx/proxy_common.conf; }
    location = /healthz { proxy_pass http://guardrail_api; include /etc/nginx/proxy_common.conf; }
    location = /readyz  { proxy_pass http://guardrail_api; include /etc/nginx/proxy_common.conf; }

    # Web console. In production this serves the built React SPA. In this sandbox
    # (no Node to run Vite), a self-contained single-file console is served here —
    # it talks to the same-origin API and needs no build step.
    root /usr/share/nginx/html;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}
