name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (lint, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: guardrail
          POSTGRES_PASSWORD: guardrail
          POSTGRES_DB: guardrail_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U guardrail"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - name: Download modules
        run: go mod download
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend
      - name: Test (race + coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -n 1
      - name: Build
        run: CGO_ENABLED=0 go build ./...

  frontend:
    name: Frontend (typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install
      - name: Type-check
        run: npm run typecheck
      - name: Build
        run: npm run build

  integration:
    name: Integration (live Postgres + Redis)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: guardrail
          POSTGRES_PASSWORD: guardrail
          POSTGRES_DB: guardrail
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U guardrail"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - name: Create app role + apply migrations + seed
        env:
          PGPASSWORD: guardrail
        run: |
          psql -h localhost -U guardrail -d guardrail -v ON_ERROR_STOP=1 \
            -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname='guardrail_app') THEN CREATE ROLE guardrail_app LOGIN PASSWORD 'apppass'; END IF; END \$\$;" \
            -c "GRANT CONNECT ON DATABASE guardrail TO guardrail_app;"
          for f in migrations/*.up.sql; do
            echo "applying $f"
            psql -h localhost -U guardrail -d guardrail -v ON_ERROR_STOP=1 -f "$f"
          done
          psql -h localhost -U guardrail -d guardrail -v ON_ERROR_STOP=1 -f db/seed.sql
      - name: Run integration tests
        env:
          GUARDRAIL_TEST_DSN: postgres://guardrail_app:apppass@localhost:5432/guardrail?sslmode=disable
        run: go test -tags=integration ./test/...

  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd backend && govulncheck ./...
      - name: gosec (static security analysis)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          cd backend && gosec -exclude-generated -severity medium ./...
      - name: gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: guardrail/api:ci
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: guardrail/web:ci
